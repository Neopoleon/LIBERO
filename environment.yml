name: libero
# π-CLIP-DiT / LIBERO environment
# Setup on cluster:
#   conda env create -f environment.yml
#   conda activate libero
#   pip install -e .          # install the libero package itself
#
# GPU: requires CUDA 12.8 (torch 2.10.0+cu128).
# For a different CUDA version change the torch/torchvision pip lines below.

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pip

  - pip:
    # --- Core ML ---
    - torch==2.10.0
    - torchvision==0.25.0
    - numpy==2.3.4
    - scipy==1.16.3
    - einops==0.8.2

    # --- Transformers / CLIP ---
    - transformers==5.3.0

    # --- Flow Matching ---
    - flow_matching==1.0.10
    - torchdiffeq==0.2.5

    # --- Config / experiment ---
    - hydra-core==1.3.2
    - omegaconf==2.3.0
    - easydict==1.13
    - wandb==0.25.1

    # --- LIBERO simulation stack ---
    - robosuite==1.4.0
    - robomimic==0.2.0
    - bddl==3.6.0
    - h5py==3.16.0
    - mujoco==3.6.0
    - numba==0.64.0

    # --- Vision / IO ---
    - opencv-python==4.13.0.92
    - pillow==12.1.1
    - imageio==2.37.0
    - imageio-ffmpeg==0.6.0
    - matplotlib==3.10.8

    # --- RL env / multiprocessing ---
    - gym==0.26.2
    - cloudpickle==3.1.2
    - thop==0.1.1.post2209072238

    # --- Logging / utils ---
    - tensorboard==2.20.0
    - tensorboardX==2.6.4
    - termcolor==3.3.0
    - psutil==7.2.2
    - tqdm==4.67.1
    - packaging==25.0
    - pyyaml
